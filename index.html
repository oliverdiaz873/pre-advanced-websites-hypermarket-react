<!--
Flujo de renderizado en React con Vite:

1. El navegador carga index.html
2. index.html contiene un div con id="root" que sirve como contenedor principal
3. Se ejecuta el archivo main.tsx
4. En main.tsx, React busca el elemento con id="root"
5. React renderiza el componente principal <App /> dentro de ese div
6. El componente App contiene toda la aplicación
7. Todos los demás componentes (Navbar, Home, Footer, etc.) se renderizan dentro de App

Conclusión:
React inyecta el componente principal App dentro del div con id="root",
y todo esto ocurre en el archivo main.tsx
-->
  
    <div id="root"></div> <!-- Este div es donde React va a “inyectar” toda tu aplicación. -->
    <script type="module" src="/src/main.tsx"></script> <!-- Aquí es donde arranca toda la lógica de React. -->

  </body>
